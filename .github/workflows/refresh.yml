name: Daily client refresh

on:
  schedule:
    - cron: "50 5 * * *"   # 05:50 UTC daily, 30 min after the admin refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download the latest admin tracker
        run: |
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/philipshaw-afk/french-opa-admin/main/index.html" \
            -o admin-index.html

      - name: Rebuild client data from admin tracker
        run: python pipeline/update_client_from_admin.py --admin admin-index.html --client index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Client refresh $(date -u +%Y-%m-%d)"
            git push
          fi
